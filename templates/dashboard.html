<!DOCTYPE html>
<html>
<head>
    <title>XON Neural Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: radial-gradient(circle at top left, #0f0f0f, #000000 70%);
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(0,255,160,0.05),
                rgba(0,255,160,0.05) 2px,
                transparent 2px,
                transparent 20px
            );
            animation: moveAxon 25s linear infinite;
            z-index: -1;
        }

        @keyframes moveAxon {
            from { transform: translate(0,0); }
            to { transform: translate(-200px,-200px); }
        }

        .container {
            padding: 60px;
        }

        h1 {
            color: #e6d3a3;
            font-size: 32px;
            margin-bottom: 40px;
        }

        .glass-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,255,160,0.15);
        }

        .score {
            font-size: 48px;
            font-weight: 600;
            color: #00ffaa;
            margin-bottom: 10px;
        }

        .metric {
            margin: 20px 0;
        }

        .bar {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffaa, #00cc88);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }

        .label {
            margin-bottom: 6px;
            font-size: 14px;
            color: #ccc;
        }

        .risk-low {
            color: #00ffaa;
        }

        .risk-medium {
            color: #ffcc00;
        }

        .risk-high {
            color: #ff4444;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Neuro-Psychological Analysis</h1>

    <div class="glass-panel">
        <div class="score">
            {{ profile.cognitive_score }}
        </div>
        <div>Cognitive Stability Index</div>
    </div>

    <div class="glass-panel">

        <div class="metric">
            <div class="label">Stress Level</div>
            <div class="bar">
                <div class="fill" style="width: {{ profile.stress }}%;"></div>
            </div>
        </div>

        <div class="metric">
            <div class="label">Emotional Volatility</div>
            <div class="bar">
                <div class="fill" style="width: {{ profile.volatility }}%;"></div>
            </div>
        </div>

        <div class="metric">
            <div class="label">Deception Probability</div>
            <div class="bar">
                <div class="fill" style="width: {{ profile.deception }}%;"></div>
            </div>
        </div>

        <div class="metric">
            <div class="label">Engagement Depth</div>
            <div class="bar">
                <div class="fill" style="width: {{ profile.engagement }}%;"></div>
            </div>
        </div>

    </div>

    <div class="glass-panel">
        <strong>Risk Classification:</strong>
        <span class="{% if profile.risk == 'LOW' %}risk-low{% elif profile.risk == 'MEDIUM' %}risk-medium{% else %}risk-high{% endif %}">
            {{ profile.risk }}
        </span>
    </div>

</div>

</body>
</html>
