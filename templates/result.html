<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candidate Result</title>
<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}
.card{
background:white;
padding:25px;
border-radius:14px;
max-width:700px;
margin:auto;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}
</style>
</head>
<body>

<div class="card">
<h1>Candidate Overall Result</h1>
<div id="result"></div>
</div>

<script>
async function loadResult(){
const res = await fetch("/candidate-result");
const data = await res.json();

document.getElementById("result").innerHTML =
`<h2>Overall Score: ${data.overall_score}</h2>`;
}

loadResult();
</script>

</body>
</html>
