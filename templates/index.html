<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XON Intake | KXON AI Labs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f7f7f7;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        h1 {
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 30px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            cursor: pointer;
        }

        pre {
            background: #f0f0f0;
            padding: 15px;
            overflow-x: auto;
        }

        #result {
            margin-top: 30px;
        }

        #dashboard {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>XON Cloud Multimodal Engine</h1>
    <p>Step 1 — Predictive Hiring Intake</p>

    <form id="candidateForm">
        <input type="text" name="name" placeholder="Candidate Name" required>

        <input type="number" name="age" placeholder="Age" required>

        <select name="sex" required>
            <option value="">Select Sex</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
        </select>

        <input type="text" name="role" placeholder="Role Applied For" required>

        <input type="text" name="experience" placeholder="Years of Experience" required>

        <button type="submit">Start Intake Session</button>
    </form>

    <div id="result"></div>

    <div id="dashboard"></div>
</div>

<script>
document.getElementById("candidateForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(this);

    const res = await fetch("/start-session", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
        "<h2>AI Intake Result</h2><pre>" +
        JSON.stringify(data, null, 2) +
        "</pre>";

    loadDashboard();
});

async function loadDashboard(){
    const res = await fetch("/dashboard");
    const data = await res.json();

    document.getElementById("dashboard").innerHTML =
        "<h2>Recruiter Dashboard</h2><pre>" +
        JSON.stringify(data, null, 2) +
        "</pre>";
}

setInterval(loadDashboard, 5000);
</script>

</body>
</html>
