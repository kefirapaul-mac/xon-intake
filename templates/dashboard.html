<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recruiter Dashboard</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:40px;}
.card{background:white;padding:25px;border-radius:14px;max-width:900px;margin:auto;}
input,button{width:100%;padding:12px;margin:10px 0;}
button{background:black;color:white;border:none;}
</style>
</head>
<body>

<div class="card">
<h1>Recruiter Dashboard</h1>

<div id="dashboard"></div>

<form id="scoreForm">
<input name="hr_score" placeholder="HR Score" required>
<input name="therapist_score" placeholder="Therapist Score" required>
<button type="submit">Submit Combined Score</button>
</form>

<div id="result"></div>
</div>

<script>
async function loadDashboard(){
const res = await fetch("/dashboard");
const data = await res.json();

document.getElementById("dashboard").innerHTML = `
<p><b>Candidate:</b> ${data.candidate.name}</p>
<p><b>Role:</b> ${data.candidate.role}</p>
<p><b>AI Score:</b> ${data.ai_analysis.ai_score}</p>
<p><b>Neural Manual:</b> ${data.ai_analysis.neural_user_manual}</p>
`;
}

loadDashboard();

document.getElementById("scoreForm").addEventListener("submit", async function(e){
e.preventDefault();

const formData = new FormData(this);
formData.append("session_id", localStorage.getItem("session_id"));

const res = await fetch("/submit-score",{method:"POST",body:formData});
const data = await res.json();

document.getElementById("result").innerHTML =
`<h2>Combined Score: ${data.combined_score}</h2>`;
});
</script>

</body>
</html>
