<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XON Intake</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:40px;}
.card{background:white;padding:25px;border-radius:14px;max-width:900px;margin:auto;box-shadow:0 4px 20px rgba(0,0,0,.08);}
input,select,button{width:100%;padding:12px;margin:10px 0;}
button{background:black;color:white;border:none;}
</style>
</head>
<body>

<div class="card">
<h1>XON Cloud Multimodal Engine</h1>

<form id="candidateForm">
<input name="name" placeholder="Candidate Name" required>
<input name="age" placeholder="Age" required>
<select name="sex" required>
<option>Female</option>
<option>Male</option>
<option>Other</option>
</select>
<input name="role" placeholder="Role Applied For" required>
<input name="experience" placeholder="Years Experience" required>
<button type="submit">Start Intake Session</button>
</form>

<div id="aiOutput"></div>
</div>

<script>
document.getElementById("candidateForm").addEventListener("submit", async function(e){
e.preventDefault();
const formData = new FormData(this);

const res = await fetch("/start-session",{method:"POST",body:formData});
const data = await res.json();

localStorage.setItem("session_id", data.session_id);

document.getElementById("aiOutput").innerHTML = `
<h2>AI Intake Result</h2>
<p><b>Candidate:</b> ${data.ai_analysis.candidate}</p>
<p><b>Role:</b> ${data.ai_analysis.role}</p>
<p><b>AI Score:</b> ${data.ai_analysis.ai_score}</p>
<a href="/dashboard-page">Go to Recruiter Dashboard</a>
`;
});
</script>

</body>
</html>
